<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naša Pozvánka</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdfaf7;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #d4af37;
            padding: 40px;
            background-color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        h1 { color: #d4af37; font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.2em; line-height: 1.6; }
        .date { font-weight: bold; font-size: 1.5em; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Je to tu!</h1>
        <p>Konečne sme sa rozhýbali, tak si to nenechaj újsť...</p>
        <p class="date">10. 10. 2026</p><p> o 15:30 v kostole sv. Jakube v Brne</p>
        <p>Tešíme sa na Vás!</p>
    </div>
</body>
</html>
